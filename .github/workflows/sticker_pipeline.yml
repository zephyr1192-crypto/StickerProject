name: Sticker Automation Pipeline

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Main Pipeline
        run: python main.py
        env:
          STICKER_LIMIT: "5"
          STICKER_OUTPUT_DIR: stickers_output
          PRINTFUL_API_KEY: ${{ secrets.PRINTFUL_API_KEY }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: premium-stickers-v2
          path: stickers_output/
          retention-days: 7

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: stickers_output/

      # 成功時にDiscordへ通知を送るステップ（新規追加）
      - name: Discord Notification (Success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ **ステッカー自動生成完了！**\nPrintfulへの納品とギャラリーの更新が終わりました。\nギャラリーを確認: https://zephyr1192-crypto.github.io/StickerProject/"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      # 失敗時にDiscordへ通知を送るステップ（新規追加）
      - name: Discord Notification (Failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 **【警告】ステッカー生成でエラーが発生しました！**\nGitHub Actionsのログを確認してください。"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

  deploy-to-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-generate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4