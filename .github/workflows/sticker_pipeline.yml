name: Sticker Automation Pipeline

# 実行タイミングの設定
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

# 実行環境と手順の設定
jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    # ★追加: Node.js 20の非推奨警告を消し、安全な最新版(Node 24)を強制使用する
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ★変更: requirements.txtから一括インストールするように最適化
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Main Pipeline
        run: python main.py
        env:
          STICKER_LIMIT: "5"
          STICKER_OUTPUT_DIR: stickers_output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-stickers
          path: stickers_output/
          retention-days: 7