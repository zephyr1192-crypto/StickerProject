name: Sticker Automation Pipeline

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

# GitHub Pagesへのデプロイ権限を追加
permissions:
  contents: read
  pages: write
  id-token: write

# デプロイの重複実行を防ぐ設定
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Main Pipeline
        run: python main.py
        env:
          STICKER_LIMIT: "5"
          STICKER_OUTPUT_DIR: stickers_output

      # これまでのZIPバックアップ機能
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: premium-stickers-v2
          path: stickers_output/
          retention-days: 7

      # Web公開用データの準備
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: stickers_output/

  # Webサイトとして公開（デプロイ）するジョブ
  deploy-to-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-generate # 生成が終わってから実行
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4